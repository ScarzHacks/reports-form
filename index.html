<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Report User – Kylito</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tailwind CDN for beautiful modern UI -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
  <div class="container max-w-2xl mx-auto mt-8 px-4">
    
    <!-- TAB NAVIGATION -->
    <nav class="flex bg-white border-b mb-6 rounded-t-xl overflow-hidden shadow-sm">
      <button onclick="showSubmit()" id="submitTab"
        class="flex-1 py-4 text-lg font-semibold border-b-4 border-blue-600 text-blue-600">
        Submit Report
      </button>
      <button onclick="showView()" id="viewTab"
        class="flex-1 py-4 text-lg font-semibold text-gray-500 hover:text-gray-700">
        View All Reports
      </button>
    </nav>

    <!-- SUBMIT SECTION (your original form, just wrapped) -->
    <div id="submitSection">
      <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Report a User</h1>
        <p class="text-gray-600 mt-2">All submissions are reviewed by moderators. Reports are confidential.</p>
      </header>

      <form id="reportForm" class="report-form bg-white p-8 rounded-2xl shadow-sm">
        <div class="form-group mb-6">
          <label for="username" class="block text-sm font-medium mb-2">Reported Username <span class="text-red-500">*</span></label>
          <input type="text" id="username" name="username" placeholder="Username#1234 or @username" required 
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500"/>
        </div>

        <div class="form-group mb-6">
          <label for="reason" class="block text-sm font-medium mb-2">Reason <span class="text-red-500">*</span></label>
          <select id="reason" name="reason" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500">
            <option value="" disabled selected>Choose a reason</option>
            <option value="harassment">Harassment / Toxicity</option>
            <option value="spam">Spam / Advertising</option>
            <option value="cheating">Cheating / Exploits</option>
            <option value="inappropriate">Inappropriate Content</option>
            <option value="threats">Threats / Violence</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group mb-6">
          <label for="details" class="block text-sm font-medium mb-2">Details <span class="text-red-500">*</span></label>
          <textarea id="details" name="details" rows="5" placeholder="Explain what happened..." required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500"></textarea>
        </div>

        <div class="form-group mb-6">
          <label class="block text-sm font-medium mb-2">Evidence (images, videos, files)</label>
          <input type="file" id="evidence" name="evidence" accept="image/*,video/*,.pdf" multiple 
            class="w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
          <div id="previewContainer" class="preview-container mt-3 flex flex-wrap gap-2"></div>
          <small class="text-gray-500">Up to 5 files • Max 15 MB total</small>
        </div>

        <div class="form-group checkbox flex items-center gap-3 mb-8">
          <input type="checkbox" id="anonymous" name="anonymous" class="w-5 h-5 accent-blue-600"/>
          <label for="anonymous" class="text-sm font-medium">Submit anonymously</label>
        </div>

        <button type="submit" class="btn submit-btn w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-2xl text-lg transition">
          Submit Report
        </button>
      </form>

      <div id="successMessage" class="message success hidden mt-8 bg-green-100 border border-green-400 text-green-800 p-6 rounded-2xl text-center">
        <h2 class="text-2xl font-bold">✅ Report Submitted</h2>
        <p class="mt-2">Moderators will review it soon. Thank you!</p>
      </div>

      <div id="errorMessage" class="message error hidden mt-8 bg-red-100 border border-red-400 text-red-800 p-6 rounded-2xl text-center"></div>
    </div>

    <!-- NEW: VIEW ALL REPORTS SECTION -->
    <div id="viewSection" class="hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold text-gray-900">All Reports</h2>
        <input type="text" id="searchInput" placeholder="Search reports..." 
          class="w-96 px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 text-lg">
      </div>

      <div id="reportsList" class="space-y-5 min-h-[400px]">
        <!-- Populated by JavaScript -->
      </div>

      <div class="mt-8 flex gap-4">
        <button onclick="clearAllReports()" 
          class="px-6 py-3 text-red-600 hover:text-red-700 font-medium flex items-center gap-2">
          🗑️ Clear all reports (demo only)
        </button>
        <button onclick="showSubmit()" 
          class="px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl font-medium">
          ← Back to Submit
        </button>
      </div>
    </div>
  </div>

  <footer class="text-center text-gray-500 text-sm mt-16 mb-8">
    <p>© 2026 Kylito Community • Reports are private • Demo mode (data saved in your browser only)</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
