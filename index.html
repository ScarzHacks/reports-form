<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Report User – Kylito</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>Report a User</h1>
      <p>All submissions are reviewed by moderators. Reports are confidential.</p>
    </header>

    <form id="reportForm" class="report-form">
      <div class="form-group">
        <label for="username">Reported Username <span class="required">*</span></label>
        <input type="text" id="username" name="username" placeholder="Username#1234 or @username" required />
      </div>

      <div class="form-group">
        <label for="reason">Reason <span class="required">*</span></label>
        <select id="reason" name="reason" required>
          <option value="" disabled selected>Choose a reason</option>
          <option value="harassment">Harassment / Toxicity</option>
          <option value="spam">Spam / Advertising</option>
          <option value="cheating">Cheating / Exploits</option>
          <option value="inappropriate">Inappropriate Content</option>
          <option value="threats">Threats / Violence</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="details">Details <span class="required">*</span></label>
        <textarea id="details" name="details" rows="5" placeholder="Explain what happened..." required></textarea>
      </div>

      <div class="form-group">
        <label>Evidence (images, videos, files)</label>
        <input type="file" id="evidence" name="evidence" accept="image/*,video/*,.pdf" multiple />
        <div id="previewContainer" class="preview-container"></div>
        <small>Up to 5 files • Max 15 MB total</small>
      </div>

      <div class="form-group checkbox">
        <input type="checkbox" id="anonymous" name="anonymous" />
        <label for="anonymous">Submit anonymously</label>
      </div>

      <button type="submit" class="btn submit-btn">Submit Report</button>
    </form>

    <div id="successMessage" class="message success hidden">
      <h2>Report Submitted</h2>
      <p>Moderators will review it soon.</p>
    </div>

    <div id="errorMessage" class="message error hidden"></div>
  </div>

  <footer>
    <p>© 2026 Kylito Community • Reports are private</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
