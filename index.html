<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EW Mod Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #0d1117;
      color: #e6edf3;
    }
    header {
      background: #1f6feb;
      color: white;
      padding: 20px;
      text-align: center;
    }
    nav {
      display: flex;
      background: #0d47a1;
    }
    nav a {
      flex: 1;
      color: white;
      text-align: center;
      padding: 14px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.2s;
    }
    nav a.active {
      background: #1f6feb;
    }
    nav a:hover {
      background: #388bfd;
    }
    .container {
      max-width: 760px;
      margin: 30px auto;
      padding: 0 20px;
    }
    form {
      background: rgba(22, 27, 34, 0.92);
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      color: #e6edf3;
    }
    label {
      display: block;
      margin: 18px 0 6px;
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      padding: 11px;
      border: 1px solid #30363d;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 16px;
      background: #0d1117;
      color: #e6edf3;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    button {
      background: #238636;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
      transition: background 0.2s;
    }
    button:hover {
      background: #2ea043;
    }
    #status {
      margin-top: 16px;
      font-weight: bold;
      text-align: center;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .report-item {
      background: rgba(22, 27, 34, 0.92);
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      line-height: 1.6;
      position: relative;
    }
    .delete-btn {
      background: #da3633;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      position: absolute;
      top: 15px;
      right: 15px;
    }
    .delete-btn:hover {
      background: #f85149;
    }
    #search-container {
      margin: 20px 0;
      text-align: center;
    }
    #searchInput {
      width: 100%;
      max-width: 500px;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #0d1117;
      color: #e6edf3;
    }
    #no-results {
      text-align: center;
      color: #8b949e;
      font-style: italic;
      margin: 30px 0;
      display: none;
    }
    #login-screen, #denied-screen {
      position: fixed;
      inset: 0;
      background: #000;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      text-align: center;
      z-index: 9999;
      padding: 20px;
    }
    #login-screen button {
      margin-top: 30px;
      padding: 16px 32px;
      background: #5865F2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.5rem;
      cursor: pointer;
    }
    #logout-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 10px 20px;
      background: #da3633;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      z-index: 10000;
    }

    /* Background image only on reports tab */
    #view {
      position: relative;
      min-height: 100vh;
    }
    #view::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('https://cdn.discordapp.com/attachments/1461528008950157505/1477723479859134588/thumbnail_1.png?ex=69a5ccbc&is=69a47b3c&hm=792ee17eb023081981388110e5349a495896ea979f6671021c927db932595641&');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      opacity: 0.22;
      z-index: -2;
    }
    #view::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(13, 17, 23, 0.65);
      z-index: -1;
    }
    #view .container,
    #view #search-container,
    #view #reports-list,
    #view #no-results {
      position: relative;
      z-index: 1;
    }

    /* RGB Glowing Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.4;
      animation: floatOrb 22s infinite ease-in-out, pulseOrb 7s infinite alternate;
    }
    #view::after::before,
    #view::after::after,
    #view::after::before::before {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.4;
      animation: floatOrb 22s infinite ease-in-out, pulseOrb 7s infinite alternate;
    }
    #view::after::before {
      width: 380px;
      height: 380px;
      background: radial-gradient(circle at 35% 45%, #ff1a1a 10%, transparent 70%);
      box-shadow: 0 0 140px #ff1a1a, inset 0 0 70px #660000;
      top: 12%;
      left: 5%;
      animation-delay: 0s;
    }
    #view::after::after {
      width: 320px;
      height: 320px;
      background: radial-gradient(circle at 60% 65%, #330000 15%, transparent 65%);
      box-shadow: 0 0 120px #330000, inset 0 0 60px #000000;
      bottom: 18%;
      right: 10%;
      animation-delay: 5s;
    }
    #view::after::before::before {
      width: 450px;
      height: 450px;
      background: radial-gradient(circle at 50% 30%, #990000 5%, transparent 75%);
      box-shadow: 0 0 160px #990000, inset 0 0 80px #330000;
      top: 40%;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: 11s;
    }
    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(60px, -40px); }
      50% { transform: translate(-30px, 70px); }
      75% { transform: translate(-80px, -30px); }
    }
    @keyframes pulseOrb {
      0% { opacity: 0.28; transform: scale(0.92); }
      100% { opacity: 0.55; transform: scale(1.18); }
    }
  </style>
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen">
    <h2>EW Mod Panel</h2>
    <p>Sign in with Discord to access the panel.</p>
    <button onclick="signInWithDiscord()">Sign in with Discord</button>
  </div>

  <!-- Access denied screen (wrong ID) -->
  <div id="denied-screen" style="display:none;">
    <h2>Access Denied</h2>
    <p>Your Discord account is not authorized for this panel.</p>
    <button onclick="sb.auth.signOut().then(() => location.reload())">Logout & Try Again</button>
  </div>

  <!-- Main content (hidden until authorized) -->
  <div id="main-content" style="display:none;">
    <button id="logout-btn" onclick="sb.auth.signOut().then(() => location.reload())">Logout</button>

    <header>
      <h1>EW Mod Panel</h1>
    </header>

    <nav>
      <a href="#submit" class="active" onclick="showTab('submit')">Submit Report</a>
      <a href="#view" onclick="showTab('view')">View All Reports</a>
    </nav>

    <div class="container">

      <!-- Submit tab -->
      <div id="submit" class="tab-content active">
        <form id="reportForm">
          <label>Reported User Name</label>
          <input id="reported_user" placeholder="Username or ID" required>

          <label>Reason for Report</label>
          <textarea id="reason" placeholder="Describe the incident in detail..." required></textarea>

          <label>Proposed Punishment</label>
          <input id="punishment" placeholder="e.g. Warning / 3-day mute / Permanent ban">

          <label>Moderator Who Took Action</label>
          <input id="moderator" placeholder="Your username / Moderator name" required>

          <label>Additional Link (proof, screenshot, clip...)</label>
          <input id="link" placeholder="https://" type="url">

          <label>Image Proof (optional)</label>
          <input type="file" id="image" accept="image/*">

          <label>Video Proof (optional)</label>
          <input type="file" id="video" accept="video/*">

          <button type="submit">Submit Report</button>
        </form>

        <div id="status"></div>
      </div>

      <!-- View reports tab -->
      <div id="view" class="tab-content">
        <div id="search-container">
          <input type="text" id="searchInput" placeholder="Search reports...">
        </div>
        <div id="reports-list">Loading reports...</div>
        <div id="no-results">No matching reports found.</div>
      </div>

    </div>
  </div>

  <script>
    const supabaseUrl = 'https://ugijazxbscpiwavmkjbr.supabase.co';
    const supabaseKey = 'sb_publishable_tUlhOkObHpTpwlh-9R7x0Q_1kd_q6qe';
    const { createClient } = window.supabase;
    const sb = createClient(supabaseUrl, supabaseKey);

    // === ONLY THESE Supabase user IDs (UUIDs) can access the entire site ===
    // Your ID is already added below
    const ALLOWED_USER_IDS = [
      '43940f16-1cf6-4790-80fd-711c563362a2'  // Your UID
      // Add more trusted users here if needed, e.g.:
      // 'another-uuid-here-1234-5678-9abc-def012345678'
    ];

    let allReports = [];

    // Check login and authorization on load
    (async () => {
      const { data: { session } } = await sb.auth.getSession();

      if (!session) {
        // Not logged in → show login screen
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('denied-screen').style.display = 'none';
        return;
      }

      const userId = session.user.id;

      // Check if this user ID is allowed
      if (!ALLOWED_USER_IDS.includes(userId)) {
        // Unauthorized → show denied screen
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('denied-screen').style.display = 'flex';
        return;
      }

      // Authorized → show main content
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('denied-screen').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';

      console.log('Authorized access granted for user ID:', userId);
    })();

    // Discord login function
    async function signInWithDiscord() {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'discord',
        options: {
          redirectTo: window.location.href  // returns to current page after login
        }
      });
      if (error) alert('Login error: ' + error.message);
    }

    // Tab switching
    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');

      document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
      document.querySelector(`nav a[href="#${tabId}"]`)?.classList.add('active');

      if (tabId === 'view') loadReports();
    }

    async function loadReports() {
      const list = document.getElementById('reports-list');
      const noResults = document.getElementById('no-results');
      list.innerHTML = 'Loading reports...';
      noResults.style.display = 'none';

      const { data, error } = await sb
        .from('reports')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        list.innerHTML = `<p style="color:#f85149; text-align:center;">Error: ${error.message}</p>`;
        return;
      }

      allReports = data || [];

      if (allReports.length === 0) {
        list.innerHTML = '<p style="text-align:center; color:#8b949e;">No reports yet.</p>';
        return;
      }

      renderReports(allReports);
    }

    function renderReports(reports) {
      const list = document.getElementById('reports-list');
      const noResults = document.getElementById('no-results');
      list.innerHTML = '';

      if (reports.length === 0) {
        noResults.style.display = 'block';
        return;
      }

      noResults.style.display = 'none';

      reports.forEach(r => {
        const item = document.createElement('div');
        item.className = 'report-item';
        item.innerHTML = `
          <strong>Reported user:</strong> ${r.reported_user || '—'}<br>
          <strong>Reason:</strong> ${r.reason || '—'}<br>
          <strong>Punishment:</strong> ${r.punishment || 'None'}<br>
          <strong>Moderator:</strong> ${r.moderator || '—'}<br>
          <strong>Submitted:</strong> ${new Date(r.created_at).toLocaleString()}<br>
        `;
        if (r.link) item.innerHTML += `<a href="${r.link}" target="_blank">Proof link</a><br>`;
        if (r.image_url) item.innerHTML += `<img src="${r.image_url}" style="max-width:100%; margin-top:10px;" alt="image"><br>`;
        if (r.video_url) item.innerHTML += `<video src="${r.video_url}" controls style="max-width:100%; margin-top:10px;"></video><br>`;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = 'Delete';
        delBtn.onclick = () => deleteReport(r.id, item);
        item.appendChild(delBtn);

        list.appendChild(item);
      });
    }

    document.getElementById('searchInput')?.addEventListener('input', e => {
      const term = e.target.value.toLowerCase().trim();
      if (!term) return renderReports(allReports);

      const filtered = allReports.filter(r =>
        [r.reported_user, r.reason, r.punishment, r.moderator, r.link]
          .some(v => v?.toLowerCase().includes(term))
      );

      renderReports(filtered);
    });

    async function deleteReport(id, element) {
      if (!confirm("Delete permanently?")) return;

      try {
        const { error } = await sb.from('reports').delete().eq('id', id);
        if (error) throw error;

        element.remove();
        allReports = allReports.filter(r => r.id !== id);
        renderReports(allReports);
      } catch (err) {
        alert("Delete failed: " + err.message);
      }
    }

    document.getElementById('reportForm')?.addEventListener('submit', async e => {
      e.preventDefault();

      const status = document.getElementById('status');
      status.textContent = 'Submitting...';
      status.style.color = 'white';

      const formData = {
        reported_user: document.getElementById('reported_user').value.trim() || null,
        reason: document.getElementById('reason').value.trim(),
        punishment: document.getElementById('punishment').value.trim() || null,
        moderator: document.getElementById('moderator').value.trim() || null,
        link: document.getElementById('link').value.trim() || null,
      };

      const imageFile = document.getElementById('image').files[0];
      const videoFile = document.getElementById('video').files[0];

      try {
        let image_url = '', video_url = '';

        if (imageFile) {
          const path = `images/${Date.now()}_${imageFile.name.replace(/\s+/g, '_')}`;
          const { error: upErr } = await sb.storage.from('report-media').upload(path, imageFile);
          if (upErr) throw upErr;
          const { data } = sb.storage.from('report-media').getPublicUrl(path);
          image_url = data.publicUrl;
        }

        if (videoFile) {
          const path = `videos/${Date.now()}_${videoFile.name.replace(/\s+/g, '_')}`;
          const { error: upErr } = await sb.storage.from('report-media').upload(path, videoFile);
          if (upErr) throw upErr;
          const { data } = sb.storage.from('report-media').getPublicUrl(path);
          video_url = data.publicUrl;
        }

        const { error } = await sb.from('reports').insert({ ...formData, image_url, video_url });
        if (error) throw error;

        status.style.color = '#2ea043';
        status.textContent = 'Submitted successfully!';
        document.getElementById('reportForm').reset();

        setTimeout(() => status.textContent = '', 4000);
      } catch (err) {
        status.style.color = '#f85149';
        status.textContent = 'Failed: ' + (err.message || 'Unknown');
        console.error(err);
      }
    });
  </script>
</body>
</html>
